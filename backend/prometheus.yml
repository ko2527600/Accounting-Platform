global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'accounting-platform'

rule_files:
  - 'alerts.yml'

scrape_configs:
  - job_name: 'backend-metrics'
    static_configs:
      - targets:
          - 'backend-1:4000'
          - 'backend-2:4000'
          - 'backend-3:4000'
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
