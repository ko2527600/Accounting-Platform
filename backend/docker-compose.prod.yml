version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: accounting-postgres
    environment:
      POSTGRES_DB: accounting_db
      POSTGRES_USER: accounting_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accounting_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: accounting-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-change-me-in-production}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Backend API (3 instances for load balancing)
  backend-1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accounting-backend-1
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://accounting_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/accounting_db?schema=public&connection_limit=50&pool_timeout=10&connect_timeout=5&statement_timeout=30000
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-generate-strong-secret-in-production}
      OTEL_ENABLED: true
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend-2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accounting-backend-2
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://accounting_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/accounting_db?schema=public&connection_limit=50&pool_timeout=10&connect_timeout=5&statement_timeout=30000
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-generate-strong-secret-in-production}
      OTEL_ENABLED: true
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "4001:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  backend-3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: accounting-backend-3
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://accounting_user:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/accounting_db?schema=public&connection_limit=50&pool_timeout=10&connect_timeout=5&statement_timeout=30000
      REDIS_URL: redis://:${REDIS_PASSWORD:-change-me-in-production}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-generate-strong-secret-in-production}
      OTEL_ENABLED: true
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
    ports:
      - "4002:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    container_name: accounting-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3
    restart: unless-stopped

  # Prometheus (Metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: accounting-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana (Dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: accounting-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

  # Jaeger (Distributed Tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: accounting-jaeger
    ports:
      - "16686:16686"  # UI
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: true
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
